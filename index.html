<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한화생명 보험 상담 챗봇</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #F37021;
    --primary-dark: #D95E15;
    --primary-light: #FFF4ED;
    --bg: #F5F6FA;
    --white: #FFFFFF;
    --gray-100: #F0F1F5;
    --gray-200: #E2E4EA;
    --gray-400: #9CA0AE;
    --gray-600: #6B7080;
    --gray-800: #2D3142;
    --radius: 16px;
    --radius-sm: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,.08);
  }
  body {
    font-family: -apple-system, 'Pretendard', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--gray-800);
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* ── Chat Container ── */
  .chat-wrap {
    width: 100%;
    max-width: 480px;
    height: 100dvh;
    max-height: 900px;
    background: var(--white);
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 40px rgba(0,0,0,.12);
    position: relative;
  }
  @media (min-width: 520px) {
    .chat-wrap { border-radius: 24px; height: 92dvh; }
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    padding: 14px 20px 0;
    flex-shrink: 0;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 12px;
  }
  .header-icon {
    width: 42px; height: 42px;
    background: rgba(255,255,255,.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .header-text h1 { font-size: 16px; font-weight: 700; }
  .header-text p { font-size: 12px; opacity: .85; margin-top: 2px; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 0;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 0;
    border: none;
    background: rgba(255,255,255,.1);
    color: rgba(255,255,255,.6);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    border-bottom: 3px solid transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .tab-btn:first-child { border-radius: 0 0 0 0; }
  .tab-btn:last-child { border-radius: 0 0 0 0; }
  .tab-btn.active {
    background: rgba(255,255,255,.2);
    color: #fff;
    border-bottom-color: #fff;
  }
  .tab-btn:hover:not(.active) {
    background: rgba(255,255,255,.15);
    color: rgba(255,255,255,.85);
  }
  .tab-icon { font-size: 15px; }

  /* ── Messages Area ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 4px; }

  /* ── Bubble ── */
  .msg { display: flex; gap: 8px; max-width: 88%; animation: fadeUp .3s ease; }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--primary-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .msg.user .msg-avatar { background: var(--gray-100); }
  .msg-bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.6;
    font-size: 14px;
    word-break: keep-all;
  }
  .msg.bot .msg-bubble {
    background: var(--gray-100);
    border-top-left-radius: 4px;
  }
  .msg.user .msg-bubble {
    background: var(--primary);
    color: #fff;
    border-top-right-radius: 4px;
  }

  /* ── Typing indicator ── */
  .typing { display: flex; gap: 4px; padding: 8px 0; }
  .typing span {
    width: 7px; height: 7px; background: var(--gray-400);
    border-radius: 50%; animation: bounce .6s infinite alternate;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }

  /* ── Quick Replies ── */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 4px 0 4px 40px;
    animation: fadeUp .3s ease;
  }
  .quick-btn {
    padding: 8px 14px;
    border: 1.5px solid var(--primary);
    border-radius: 20px;
    background: var(--white);
    color: var(--primary);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .quick-btn:hover {
    background: var(--primary);
    color: #fff;
  }

  /* ── Product Card ── */
  .product-card {
    background: var(--white);
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-top: 8px;
    font-size: 13px;
    line-height: 1.6;
  }
  .product-card .card-title {
    font-weight: 700;
    font-size: 14px;
    color: var(--primary);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .product-card .card-badge {
    font-size: 11px;
    background: var(--primary-light);
    color: var(--primary-dark);
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .product-card .card-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    border-bottom: 1px solid var(--gray-100);
  }
  .product-card .card-row:last-child { border-bottom: none; }
  .product-card .card-label { color: var(--gray-600); }
  .product-card .card-value { font-weight: 600; text-align: right; }
  .product-card .card-features {
    margin-top: 8px;
    padding: 8px 10px;
    background: var(--primary-light);
    border-radius: 8px;
    font-size: 12px;
    color: var(--gray-800);
  }
  .product-card .card-features li { margin: 2px 0; list-style: none; }
  .product-card .card-features li::before { content: "✓ "; color: var(--primary); font-weight: 700; }
  .detail-btn {
    margin-top: 8px;
    width: 100%;
    padding: 8px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
  }
  .detail-btn:hover { background: var(--primary-dark); }

  /* ── Comparison Table ── */
  .compare-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-top: 8px;
  }
  .compare-table th {
    background: var(--primary);
    color: #fff;
    padding: 8px 6px;
    font-weight: 600;
    text-align: center;
  }
  .compare-table th:first-child { border-radius: 8px 0 0 0; }
  .compare-table th:last-child { border-radius: 0 8px 0 0; }
  .compare-table td {
    padding: 7px 6px;
    border-bottom: 1px solid var(--gray-100);
    text-align: center;
    word-break: keep-all;
  }
  .compare-table tr:nth-child(even) { background: var(--gray-100); }

  /* ── Scenario Card ── */
  .scenario-card {
    background: linear-gradient(135deg, var(--primary-light), #FFF9F5);
    border: 1.5px solid var(--primary);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-top: 8px;
    font-size: 13px;
  }
  .scenario-card .sc-persona {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 6px;
    color: var(--primary-dark);
  }
  .scenario-card .sc-concern {
    font-style: italic;
    color: var(--gray-600);
    margin-bottom: 8px;
    padding: 6px 10px;
    background: var(--white);
    border-radius: 8px;
  }
  .scenario-card .sc-product {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px dashed var(--gray-200);
  }
  .scenario-card .sc-product:last-of-type { border-bottom: none; }
  .scenario-card .sc-total {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 2px solid var(--primary);
    font-weight: 700;
    text-align: right;
    color: var(--primary-dark);
  }
  .scenario-card .sc-summary {
    margin-top: 8px;
    font-size: 12px;
    color: var(--gray-600);
    line-height: 1.5;
  }

  /* ── Input Area ── */
  .input-area {
    padding: 12px 16px;
    border-top: 1px solid var(--gray-200);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    background: var(--white);
  }
  .input-area input {
    flex: 1;
    padding: 12px 16px;
    border: 1.5px solid var(--gray-200);
    border-radius: 24px;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .input-area input:focus { border-color: var(--primary); }
  .input-area input::placeholder { color: var(--gray-400); }
  .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--primary);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    transition: background .2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .send-btn:hover { background: var(--primary-dark); }
  .send-btn:disabled { background: var(--gray-200); cursor: default; }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounce {
    to { transform: translateY(-6px); opacity: .4; }
  }
</style>
</head>
<body>

<div class="chat-wrap">
  <div class="header">
    <div class="header-top">
      <div class="header-icon">H</div>
      <div class="header-text">
        <h1 id="headerTitle">한화생명 보험 상담</h1>
        <p id="headerDesc">AI 상담사가 도와드립니다</p>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" id="tabCustomer" onclick="switchMode('customer')">
        <span class="tab-icon">💬</span> 고객 상담
      </button>
      <button class="tab-btn" id="tabInternal" onclick="switchMode('internal')">
        <span class="tab-icon">📋</span> 사내 업무
      </button>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="궁금한 점을 입력하세요..." autocomplete="off">
    <button class="send-btn" id="sendBtn" onclick="handleSend()">&#10148;</button>
  </div>
</div>

<script src="products-data.js"></script>
<script src="config.js"></script>
<script>
const $messages = document.getElementById('messages');
const $input = document.getElementById('userInput');

// ── Config (loaded from config.js) ──
const API_KEY = CONFIG.API_KEY;
const MODEL = CONFIG.MODEL;

// ── Mode Prompts ──
const PROMPTS = {
  customer: `당신은 한화생명 AI 보험 상담사입니다. 항상 존댓말(합쇼체/해요체)을 사용하여 따뜻하고 친절하게 고객을 응대합니다.

## 말투 규칙
- 반드시 존댓말(해요체)을 사용하세요. 예: "~입니다", "~드릴게요", "~하시겠어요?", "~추천드려요"
- 고객을 "고객님"으로 호칭하세요.
- 공감 표현을 적극 사용하세요. 예: "걱정이 되시죠", "좋은 선택이세요", "충분히 이해합니다"
- 딱딱한 설명서 느낌이 아닌, 실제 상담사처럼 대화하듯 답변하세요.

## 역할
- 고객님의 상황(나이, 성별, 예산, 관심사)에 맞는 보험 상품을 추천합니다.
- 상품의 보장 내용, 보험료, 특징, 유의사항을 정확히 안내합니다.
- 전문 용어는 쉽게 풀어서 설명합니다.
- 고객이 비교를 원하면 상품 간 차이를 명확히 설명합니다.

## 응답 규칙
- 반드시 아래 제공된 상품 데이터에 기반해서만 답변하세요. 데이터에 없는 상품이나 수치를 만들어내지 마세요.
- 보험료, 보장금액 등 숫자는 정확히 인용하세요.
- 답변은 간결하되 핵심 정보는 빠짐없이 전달하세요.
- 금액은 "만원" 단위로 읽기 쉽게 표시하세요.
- 유의사항(면책기간, 감액기간, 해약환급금 등)도 반드시 안내하세요.
- 확실하지 않은 내용은 "정확한 내용은 고객센터(1588-6363)로 문의해주시면 자세히 안내받으실 수 있습니다"로 안내하세요.
- 마크다운 **굵게**, *기울임* 등을 활용해 가독성 좋게 답변하세요.

## 보험 상품 데이터
${JSON.stringify(DATA, null, 2)}`,

  internal: `당신은 한화생명 사내 업무 어시스턴트입니다. 직원이 사내 규정, 상품 스펙, 인수심사 기준, 보험금 청구 프로세스, 민원 처리 절차 등을 빠르게 찾을 수 있도록 도와줍니다.

## 말투 규칙
- 간결한 존댓말을 사용하되 군더더기 없이 핵심만 전달하세요.
- 불필요한 인사, 공감 표현, 감정 표현은 생략하세요.
- "~입니다", "~됩니다" 등 간결한 종결어미를 사용하세요.
- 항목이 여러 개면 번호 매기거나 불릿으로 정리하세요.

## 역할
- 상품별 스펙(가입연령, 보험기간, 보장내용, 보험료)을 정확히 안내합니다.
- 인수심사(언더라이팅) 기준과 조건을 안내합니다.
- 보험금 청구·지급 프로세스 및 필요 서류를 안내합니다.
- 고객 민원 처리 절차와 에스컬레이션 기준을 안내합니다.
- 상품 간 비교 데이터를 제공합니다.

## 응답 규칙
- 반드시 아래 데이터에 근거해서만 답변하세요. 데이터에 없는 내용은 "해당 데이터가 없습니다. 관련 부서에 확인하세요."로 안내하세요.
- 수치, 기준, 조건은 정확히 인용하세요.
- 긴 설명 대신 표, 리스트, 요약 형태로 답변하세요.
- 마크다운 **굵게**, 리스트 등을 활용해 빠르게 스캔할 수 있게 구성하세요.

## 사내 데이터
${JSON.stringify(DATA, null, 2)}`
};

// ── State ──
let currentMode = 'customer';
let chatHistory = [];
let isStreaming = false;

// Initialize
window.addEventListener('DOMContentLoaded', () => {
  showWelcome();
});

// ── Mode Switch ──
function switchMode(mode) {
  if (mode === currentMode || isStreaming) return;
  currentMode = mode;
  chatHistory = [];

  // Update tabs
  document.getElementById('tabCustomer').classList.toggle('active', mode === 'customer');
  document.getElementById('tabInternal').classList.toggle('active', mode === 'internal');

  // Update header
  if (mode === 'customer') {
    document.getElementById('headerTitle').textContent = '한화생명 보험 상담';
    document.getElementById('headerDesc').textContent = 'AI 상담사가 도와드립니다';
    $input.placeholder = '궁금한 점을 입력하세요...';
  } else {
    document.getElementById('headerTitle').textContent = '한화생명 사내 업무';
    document.getElementById('headerDesc').textContent = 'AI 어시스턴트가 도와드립니다';
    $input.placeholder = '규정, 프로세스, 상품 스펙을 검색하세요...';
  }

  // Clear and show welcome
  $messages.innerHTML = '';
  showWelcome();
}

// ── Welcome ──
function showWelcome() {
  if (currentMode === 'customer') {
    addBot(`안녕하세요! <b>한화생명 AI 보험 상담사</b>입니다.\n\n고객님의 상황에 맞는 보험을 추천해드릴게요.\n아래 버튼을 누르거나 자유롭게 질문해주세요.`);
    addQuickReplies([
      '30대 맞춤 상품 추천해줘',
      '암보험이랑 건강보험 차이가 뭐야?',
      '월 20만원으로 어떤 보험 들 수 있어?',
      '비갱신형이 뭔가요?',
      '실손보험 알려줘'
    ]);
  } else {
    addBot(`<b>사내 업무 어시스턴트</b>입니다.\n\n상품 스펙, 인수심사 기준, 청구 프로세스, 민원 처리 절차 등을 검색할 수 있습니다.`);
    addQuickReplies([
      '인수심사 기준 알려줘',
      '보험금 청구 프로세스',
      '민원 처리 절차와 에스컬레이션',
      '고혈압 고객 인수 조건',
      '정기보험 vs 종신보험 스펙 비교',
      '암보험 보험료 테이블'
    ]);
  }
}

// ── Core: Send / Receive ──
function handleSend() {
  const text = $input.value.trim();
  if (!text || isStreaming) return;
  addUser(text);
  $input.value = '';
  sendToClaudeAPI(text);
}

$input.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSend();
});

function handleQuickReply(text) {
  if (isStreaming) return;
  addUser(text);
  sendToClaudeAPI(text);
}

// ── Claude API Direct Call (Streaming) ──
async function sendToClaudeAPI(text) {
  isStreaming = true;
  $input.disabled = true;
  document.getElementById('sendBtn').disabled = true;

  chatHistory.push({ role: 'user', content: text });

  const typingEl = addTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 1024,
        system: PROMPTS[currentMode],
        stream: true,
        messages: chatHistory,
      }),
    });

    typingEl.remove();

    if (!res.ok) {
      const err = await res.text();
      addBot(`API 오류가 발생했습니다: ${res.status}`);
      chatHistory.pop();
      isStreaming = false;
      $input.disabled = false;
      document.getElementById('sendBtn').disabled = false;
      return;
    }

    const { bubbleEl } = addBotStreaming();
    let fullText = '';

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (!data || data === '[DONE]') continue;

        try {
          const parsed = JSON.parse(data);
          if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
            fullText += parsed.delta.text;
            bubbleEl.innerHTML = renderMarkdown(fullText);
            scrollBottom();
          }
        } catch {}
      }
    }

    chatHistory.push({ role: 'assistant', content: fullText });

    if (chatHistory.length > 20) {
      chatHistory = chatHistory.slice(-20);
    }

  } catch (err) {
    typingEl.remove();
    addBot('API 연결에 실패했습니다. 네트워크 연결을 확인해주세요.');
    chatHistory.pop();
  }

  isStreaming = false;
  $input.disabled = false;
  document.getElementById('sendBtn').disabled = false;
  $input.focus();
}

// ── Simple Markdown Renderer ──
function renderMarkdown(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/\*(.+?)\*/g, '<i>$1</i>')
    .replace(/`(.+?)`/g, '<code style="background:rgba(0,0,0,.06);padding:1px 4px;border-radius:3px;">$1</code>')
    .replace(/\n/g, '<br>');
}

// ── DOM Helpers ──
function addUser(text) {
  const html = `<div class="msg user">
    <div class="msg-avatar">U</div>
    <div class="msg-bubble">${escapeHTML(text)}</div>
  </div>`;
  $messages.insertAdjacentHTML('beforeend', html);
  scrollBottom();
}

function addBot(text) {
  const html = `<div class="msg bot">
    <div class="msg-avatar">H</div>
    <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
  </div>`;
  $messages.insertAdjacentHTML('beforeend', html);
  scrollBottom();
}

function addBotStreaming() {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg bot';
  wrapper.innerHTML = `<div class="msg-avatar">H</div><div class="msg-bubble"></div>`;
  $messages.appendChild(wrapper);
  scrollBottom();
  return { bubbleEl: wrapper.querySelector('.msg-bubble') };
}

function addTyping() {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg bot';
  wrapper.innerHTML = `<div class="msg-avatar">H</div>
    <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  $messages.appendChild(wrapper);
  scrollBottom();
  return wrapper;
}

function addQuickReplies(options) {
  const html = `<div class="quick-replies">
    ${options.map(o => `<button class="quick-btn" onclick="handleQuickReply('${escapeAttr(o)}')">${escapeHTML(o)}</button>`).join('')}
  </div>`;
  $messages.insertAdjacentHTML('beforeend', html);
  scrollBottom();
}

function scrollBottom() {
  requestAnimationFrame(() => {
    $messages.scrollTop = $messages.scrollHeight;
  });
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escapeAttr(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}
</script>
